<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MTG IRL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06080d; --s1:#0c0f18; --s2:#111520; --s3:#181e2c;
  --bdr:#1c2232; --bdr2:#2a3248;
  --gold:#c8a44a; --glo:#78581c; --ghi:#f0d070;
  --red:#be2c2c; --grn:#1e7a42; --blu:#1a5a9a;
  --text:#b0a898; --thi:#ece0c8; --tlo:#42403a;
  --ff1:'Cinzel',serif; --ff2:'Crimson Text',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);font-family:var(--ff2);
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(200,164,74,.05) 0%,transparent 55%),
    linear-gradient(rgba(200,164,74,.013) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,164,74,.013) 1px,transparent 1px);
  background-size:100% 100%,32px 32px,32px 32px;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* ─── OVERLAYS ─── */
.ov{position:fixed;inset:0;z-index:800;background:rgba(3,5,10,.94);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);animation:fi .18s ease;}
.ov.hidden{display:none;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.panel{
  background:var(--s1);border:1px solid var(--bdr2);border-top:2px solid var(--gold);
  width:min(540px,96vw);max-height:91vh;overflow-y:auto;
  box-shadow:0 40px 100px rgba(0,0,0,.98);
  animation:su .22s cubic-bezier(.22,1,.36,1);
}
.panel.wide{width:min(820px,97vw);}
.panel.narrow{width:min(360px,95vw);}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:20px 24px 14px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;}
.pt{font-family:var(--ff1);font-size:.95rem;font-weight:700;color:var(--gold);letter-spacing:.08em;}
.pb{padding:18px 24px;}
.pf{padding:12px 24px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--bdr);}
.xbtn{background:none;border:none;color:var(--tlo);cursor:pointer;font-size:1.3rem;line-height:1;padding:0 4px;}
.xbtn:hover{color:var(--thi);}

/* ─── BUTTONS ─── */
.btn{
  font-family:var(--ff1);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:8px 16px;border:1px solid var(--bdr2);border-top:2px solid var(--glo);
  background:var(--s2);color:var(--text);cursor:pointer;border-radius:2px 3px 0 3px;
  transition:all .12s;white-space:nowrap;user-select:none;touch-action:manipulation;
}
.btn:hover{background:var(--s3);border-top-color:var(--gold);color:var(--ghi);}
.btn:active{transform:translateY(1px);}
.btn.gold{background:#1a1204;border-top-color:var(--gold);color:var(--ghi);}
.btn.gold:hover{background:#221a06;}
.btn.grn{background:#081a0c;border-top-color:#30a060;color:#70e898;}
.btn.grn:hover{background:#0c2214;}
.btn.red{background:#160606;border-top-color:var(--red);color:#ff8070;}
.btn.red:hover{background:#1e0a0a;}
.btn.blu{background:#060e1c;border-top-color:#2070c0;color:#80b8ff;}
.btn.sm{padding:5px 10px;font-size:.57rem;}
.btn.w100{width:100%;text-align:center;margin-bottom:6px;}

/* ─── INPUTS ─── */
.inp{
  width:100%;background:var(--s2);border:1px solid var(--bdr);border-bottom:2px solid var(--glo);
  color:var(--thi);font-family:var(--ff2);font-size:.9rem;padding:8px 12px;outline:none;
  border-radius:2px 2px 0 0;transition:border-color .15s;
}
.inp:focus{border-bottom-color:var(--gold);}
.inp::placeholder{color:var(--tlo);font-style:italic;}
select.inp{cursor:pointer;}
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fl label{font-family:var(--ff1);font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:var(--tlo);}
.row2{display:flex;gap:10px;}
.row2 .fl{flex:1;margin-bottom:0;}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
#login{
  position:fixed;inset:0;z-index:900;
  background:radial-gradient(ellipse at 50% 25%,#161008 0%,#06080d 70%);
  display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(200,164,74,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,164,74,.025) 1px,transparent 1px);
  background-size:32px 32px;
}
#login.hidden{display:none;}
.lbox{
  background:var(--s1);border:1px solid var(--bdr2);border-top:3px solid var(--gold);
  padding:50px 42px;width:min(400px,94vw);text-align:center;
  box-shadow:0 60px 140px rgba(0,0,0,1),0 0 60px rgba(200,164,74,.06);
}
.llogo{font-family:var(--ff1);font-size:2.8rem;font-weight:900;color:var(--gold);
  letter-spacing:.22em;text-shadow:0 0 40px rgba(200,164,74,.4);margin-bottom:5px;}
.lsub{font-family:var(--ff1);font-size:.52rem;letter-spacing:.36em;color:var(--tlo);margin-bottom:38px;}
.orn{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 32px;}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
#app{display:none;height:100vh;flex-direction:column;}
#app.on{display:flex;}

#topbar{
  height:50px;background:var(--s1);border-bottom:2px solid var(--glo);
  display:flex;align-items:center;padding:0 12px;gap:9px;flex-shrink:0;
  box-shadow:0 3px 20px rgba(0,0,0,.75);
}
.tb-logo{font-family:var(--ff1);font-size:1rem;font-weight:900;letter-spacing:.18em;
  color:var(--gold);text-shadow:0 0 20px rgba(200,164,74,.3);flex-shrink:0;}
.tb-div{width:1px;height:26px;background:var(--bdr2);flex-shrink:0;}
.tb-mode{
  font-family:var(--ff1);font-size:.56rem;letter-spacing:.1em;
  padding:3px 9px;border:1px solid var(--glo);color:var(--gold);
  background:rgba(200,164,74,.08);cursor:pointer;border-radius:2px;flex-shrink:0;
}
.tb-mode:hover{border-color:var(--gold);background:rgba(200,164,74,.16);}

/* TURN DISPLAY in topbar */
#turn-display{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.turn-arrow{
  font-family:var(--ff1);font-size:.6rem;letter-spacing:.08em;color:var(--tlo);
}
#active-player-name{
  font-family:var(--ff1);font-size:.72rem;font-weight:700;
  color:var(--gold);letter-spacing:.06em;
  background:rgba(200,164,74,.1);border:1px solid var(--glo);
  padding:3px 10px;border-radius:2px;
}
#turn-num{font-family:var(--ff1);font-size:.56rem;color:var(--tlo);}
.tb-sp{flex:1;}

/* END TURN BUTTON — prominent in topbar */
#end-turn-btn{
  font-family:var(--ff1);font-size:.65rem;font-weight:700;letter-spacing:.1em;
  padding:8px 18px;
  background:linear-gradient(180deg,#1a2a0a,#0e1806);
  border:1px solid #306020;border-top:2px solid #50c030;
  color:#80f060;cursor:pointer;border-radius:2px 3px 0 3px;
  transition:all .15s;touch-action:manipulation;flex-shrink:0;
}
#end-turn-btn:hover{background:linear-gradient(180deg,#223a0c,#142008);border-top-color:#70e040;color:#a0ff80;}
#end-turn-btn:active{transform:translateY(1px);}

/* ═══════════════════════════════════════
   PLAYER PANELS GRID
═══════════════════════════════════════ */
#players-area{
  flex:1;overflow:auto;padding:10px;
  display:grid;
  gap:10px;
  align-content:start;
}
/* Layouts based on player count — set by JS */
#players-area.p1{grid-template-columns:1fr;}
#players-area.p2{grid-template-columns:1fr 1fr;}
#players-area.p3{grid-template-columns:1fr 1fr 1fr;}
#players-area.p4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
#players-area.p5{grid-template-columns:repeat(3,1fr);}
#players-area.p6{grid-template-columns:repeat(3,1fr);}
@media(max-width:700px){
  #players-area.p3,#players-area.p4,#players-area.p5,#players-area.p6{grid-template-columns:1fr 1fr;}
  #players-area.p2{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){
  #players-area{grid-template-columns:1fr!important;}
}

/* ─── PLAYER PANEL ─── */
.pp{
  background:var(--s1);border:1px solid var(--bdr2);
  display:flex;flex-direction:column;
  transition:border-color .25s,box-shadow .25s;
  min-height:280px;position:relative;overflow:hidden;
}
/* Active player glow */
.pp.active{
  border-color:var(--gold);
  box-shadow:0 0 0 1px var(--glo),0 0 30px rgba(200,164,74,.15);
}
.pp.active::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* Player header */
.pp-head{
  padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.pp-name{
  font-family:var(--ff1);font-size:.72rem;font-weight:700;
  color:var(--thi);letter-spacing:.06em;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pp.active .pp-name{color:var(--ghi);}
.pp-turn-badge{
  font-family:var(--ff1);font-size:.5rem;letter-spacing:.12em;
  background:var(--gold);color:#1a1000;padding:2px 7px;border-radius:1px;
  flex-shrink:0;margin-left:6px;display:none;
}
.pp.active .pp-turn-badge{display:block;}
.pp-format-badge{
  font-family:var(--ff1);font-size:.5rem;color:var(--glo);
  letter-spacing:.08em;flex-shrink:0;margin-left:4px;
}

/* Life section */
.pp-life{
  padding:12px 12px 8px;text-align:center;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.pp-life-adj{
  width:40px;height:40px;background:var(--s2);border:1px solid var(--bdr2);
  color:var(--tlo);font-size:1.4rem;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:2px;transition:all .1s;touch-action:manipulation;
  flex-shrink:0;
}
.pp-life-adj:hover{background:var(--s3);color:var(--gold);border-color:var(--glo);}
.pp-life-adj:active{transform:scale(.92);}
.pp-life-num{
  font-family:var(--ff1);font-size:2.8rem;font-weight:900;
  color:var(--thi);min-width:64px;text-align:center;line-height:1;
  cursor:pointer;transition:color .25s;flex:1;
}
.pp-life-num.lo{color:#ff8040;}
.pp-life-num.crit{color:#ff2828;text-shadow:0 0 18px rgba(255,30,30,.5);animation:throb 1.3s ease-in-out infinite;}
@keyframes throb{0%,100%{opacity:1}50%{opacity:.5}}

/* Quick life buttons */
.pp-quick{
  display:flex;gap:3px;padding:0 10px 8px;justify-content:center;flex-wrap:wrap;flex-shrink:0;
}
.qlb{
  font-family:var(--ff1);font-size:.55rem;letter-spacing:.06em;
  padding:3px 7px;cursor:pointer;border-radius:2px;transition:all .1s;
  touch-action:manipulation;user-select:none;border:1px solid var(--bdr);background:var(--s2);
  color:var(--tlo);
}
.qlb.pos{color:#50c870;border-color:#1a4820;}
.qlb.neg{color:#e06858;border-color:#401414;}
.qlb:hover{background:var(--s3);color:var(--thi);}
.qlb:active{transform:scale(.92);}

/* Counters in player panel */
.pp-ctrs{
  padding:4px 10px 6px;display:flex;flex-direction:column;gap:4px;
  border-top:1px solid var(--bdr);flex:1;overflow:hidden;
}
.pc-row{display:flex;align-items:center;gap:5px;}
.pc-lbl{font-size:.66rem;color:var(--tlo);flex:1;display:flex;align-items:center;gap:4px;}
.pc-ico{font-size:.78rem;width:16px;text-align:center;}
.pc-val{
  font-family:var(--ff1);font-size:.8rem;color:var(--thi);
  min-width:26px;text-align:center;
}
.pc-val.warn{color:#ff8040;}
.pc-val.dead{color:#ff2828;animation:throb 1.3s ease-in-out infinite;}
.pca{display:flex;gap:2px;}
.pca-btn{
  background:var(--s2);border:1px solid var(--bdr);color:var(--tlo);
  font-size:.72rem;width:22px;height:22px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;border-radius:2px;touch-action:manipulation;
  transition:all .1s;
}
.pca-btn:hover{background:var(--s3);color:var(--thi);}
.pca-btn:active{transform:scale(.9);}

/* Commander damage */
.cdmg-section{padding:4px 10px 6px;border-top:1px solid var(--bdr);flex-shrink:0;}
.cdmg-title{font-family:var(--ff1);font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tlo);margin-bottom:5px;}
.cdmg-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.cdmg-from{font-size:.64rem;color:var(--tlo);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdmg-val{font-family:var(--ff1);font-size:.78rem;color:var(--thi);min-width:22px;text-align:center;}
.cdmg-val.warn{color:#ff8040;}
.cdmg-val.dead{color:#ff2828;font-weight:700;}

/* Status toggles in panel */
.pp-status{
  padding:4px 10px 8px;display:flex;gap:5px;flex-wrap:wrap;
  border-top:1px solid var(--bdr);flex-shrink:0;
}
.status-chip{
  font-family:var(--ff1);font-size:.52rem;letter-spacing:.08em;
  padding:3px 8px;border:1px solid var(--bdr);background:var(--s2);
  cursor:pointer;border-radius:2px;color:var(--tlo);transition:all .12s;
  touch-action:manipulation;
}
.status-chip.on{background:#1a1006;border-color:var(--glo);color:var(--ghi);}
.status-chip:hover{background:var(--s3);color:var(--thi);}

/* ═══════════════════════════════════════
   BOTTOM BAR
═══════════════════════════════════════ */
#bottom-bar{
  height:52px;background:var(--s1);border-top:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
#bottom-bar .bb-sp{flex:1;}

/* ═══════════════════════════════════════
   CAMERA SCAN OVERLAY
═══════════════════════════════════════ */
#cam-ov{
  position:fixed;inset:0;z-index:900;
  background:#000;display:flex;flex-direction:column;
}
#cam-ov.hidden{display:none;}
#cam-video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
/* Dark vignette with hole for scan zone */
.cam-vignette{
  position:absolute;inset:0;z-index:2;pointer-events:none;
}
/* Scan guide */
.cam-guide-wrap{
  position:absolute;inset:0;z-index:3;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;
}
/* Card name is at the TOP of the card — we guide user to align top of card here */
.cam-guide{
  width:min(320px,85vw);
  border:2px solid var(--gold);
  aspect-ratio:7/1;
  box-shadow:0 0 0 4000px rgba(0,0,0,.68);
  position:relative;border-radius:2px;
  background:rgba(200,164,74,.04);
}
.cam-guide-corner{position:absolute;width:14px;height:14px;}
.cam-guide-corner.tl{top:-3px;left:-3px;border-top:3px solid var(--ghi);border-left:3px solid var(--ghi);}
.cam-guide-corner.tr{top:-3px;right:-3px;border-top:3px solid var(--ghi);border-right:3px solid var(--ghi);}
.cam-guide-corner.bl{bottom:-3px;left:-3px;border-bottom:3px solid var(--ghi);border-left:3px solid var(--ghi);}
.cam-guide-corner.br{bottom:-3px;right:-3px;border-bottom:3px solid var(--ghi);border-right:3px solid var(--ghi);}

/* Animated scan line when scanning */
.cam-scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  top:0;display:none;animation:scanmove 1.6s ease-in-out infinite;
}
.scanning .cam-scan-line{display:block;}
@keyframes scanmove{0%{top:0;opacity:1}100%{top:100%;opacity:0}}

.cam-hint{
  font-family:var(--ff1);font-size:.66rem;letter-spacing:.1em;
  color:rgba(255,255,255,.9);text-align:center;padding:0 20px;
  text-shadow:0 1px 6px rgba(0,0,0,1);
}
#cam-status{
  font-family:var(--ff1);font-size:.6rem;letter-spacing:.1em;
  color:var(--gold);background:rgba(0,0,0,.8);padding:5px 14px;border-radius:2px;
  min-height:26px;text-align:center;
}

/* Camera controls */
.cam-controls{
  position:absolute;bottom:28px;left:0;right:0;
  display:flex;justify-content:center;gap:12px;z-index:4;
}
.cam-cap-btn{
  background:linear-gradient(180deg,#2a1c08,#160e04);
  border:2px solid var(--gold);color:var(--ghi);
  font-family:var(--ff1);font-size:.68rem;letter-spacing:.1em;
  padding:13px 28px;cursor:pointer;border-radius:2px;touch-action:manipulation;
  box-shadow:0 4px 20px rgba(0,0,0,.9);transition:all .15s;
}
.cam-cap-btn:hover{background:linear-gradient(180deg,#381e0a,#201408);}
.cam-cap-btn:active{transform:scale(.97);}
.cam-close-btn{
  background:rgba(16,16,16,.9);border:1px solid #3a3a3a;color:#aaa;
  font-family:var(--ff1);font-size:.65rem;letter-spacing:.1em;
  padding:13px 20px;cursor:pointer;border-radius:2px;touch-action:manipulation;
}

/* Results panel */
#cam-results{
  position:absolute;inset:0;z-index:5;
  background:rgba(3,5,10,.97);
  display:flex;flex-direction:column;padding:18px;overflow-y:auto;
}
#cam-results.hidden{display:none;}
.cr-title{font-family:var(--ff1);font-size:.8rem;color:var(--gold);margin-bottom:12px;letter-spacing:.08em;}
.cr-match{
  display:flex;gap:12px;padding:10px;background:var(--s1);border:1px solid var(--bdr2);
  margin-bottom:7px;cursor:pointer;border-left:3px solid transparent;
  border-radius:2px;transition:all .12s;
}
.cr-match:hover{background:var(--s2);border-left-color:var(--gold);}
.cr-match img{width:54px;height:76px;object-fit:cover;border:1px solid var(--bdr2);flex-shrink:0;}
.cr-match .cr-name{font-family:var(--ff1);font-size:.75rem;color:var(--thi);margin-bottom:3px;}
.cr-match .cr-type{font-size:.63rem;color:var(--tlo);font-style:italic;margin-bottom:4px;}
.cr-match .cr-text{font-size:.63rem;color:var(--text);line-height:1.4;}
.cr-ph{width:54px;height:76px;background:var(--s2);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--ff1);font-size:.55rem;color:var(--tlo);text-align:center;}
.cr-no-results{color:var(--tlo);font-size:.78rem;font-style:italic;padding:14px 0;}
.cr-manual{
  background:var(--s2);border:1px solid var(--bdr);padding:14px;
  margin-top:8px;border-radius:2px;
}
.cr-manual-lbl{font-family:var(--ff1);font-size:.6rem;color:var(--tlo);letter-spacing:.12em;margin-bottom:8px;}
.cr-inp-row{display:flex;gap:8px;}

/* ═══════════════════════════════════════
   MODALS — NEW GAME
═══════════════════════════════════════ */
.player-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--s2);border:1px solid var(--bdr);border-left:2px solid var(--glo);
  margin-bottom:6px;border-radius:2px;
}
.player-row .pnum{font-family:var(--ff1);font-size:.6rem;color:var(--gold);min-width:20px;}
.player-row-rm{
  background:none;border:none;color:var(--tlo);cursor:pointer;
  font-size:1rem;line-height:1;padding:2px 5px;transition:color .1s;
}
.player-row-rm:hover{color:var(--red);}

/* ─── MODE GRID ─── */
.mc{font-family:var(--ff1);font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;
  padding:10px 0 5px;border-bottom:1px solid var(--bdr);margin-bottom:7px;}
.mc.arena{color:#a78bfa;} .mc.paper{color:#5eead4;} .mc.edh{color:var(--gold);} .mc.limited{color:#93c5fd;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;margin-bottom:14px;}
.mt{background:var(--s2);border:1px solid var(--bdr);padding:9px 11px;cursor:pointer;border-radius:2px;transition:all .12s;}
.mt:hover{background:var(--s3);border-color:var(--glo);}
.mt.sel{background:#161004;border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--glo);}
.mt .mn{font-family:var(--ff1);font-size:.66rem;font-weight:700;color:var(--thi);margin-bottom:3px;}
.mt .ml{font-size:.6rem;color:var(--gold);}
.mt .md{font-size:.56rem;color:var(--tlo);}

/* ─── STATS MODAL ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px;}
.stat-tile{background:var(--s2);border:1px solid var(--bdr);padding:14px;text-align:center;border-radius:2px;}
.stat-big{font-family:var(--ff1);font-size:1.8rem;font-weight:900;line-height:1;color:var(--thi);}
.stat-big.w{color:#60d880;} .stat-big.l{color:#f07060;}
.stat-lbl{font-family:var(--ff1);font-size:.52rem;letter-spacing:.1em;color:var(--tlo);margin-top:4px;}
.hist-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.hist-res{font-family:var(--ff1);font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:2px;flex-shrink:0;}
.hist-res.W{background:#081a0a;color:#60d880;border:1px solid #1a4020;}
.hist-res.L{background:#1a0606;color:#f07060;border:1px solid #481010;}
.hist-detail{flex:1;min-width:0;}
.hist-fmt{font-size:.7rem;color:var(--thi);}
.hist-meta{font-size:.6rem;color:var(--tlo);}

/* ─── HELPERS ─── */
.hidden{display:none!important;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
canvas#ocr-canvas{display:none;}
</style>
</head>
<body>
<canvas id="ocr-canvas"></canvas>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login">
  <div class="lbox">
    <div class="llogo">MTG IRL</div>
    <div class="lsub">In-Person Game Tracker</div>
    <div class="orn"></div>
    <div class="fl"><label>Your Name</label>
      <input class="inp" id="l-name" placeholder="Enter your name..." maxlength="28" autocomplete="off" autofocus>
    </div>
    <button class="btn gold w100" style="padding:12px;font-size:.72rem;margin-top:4px;" onclick="doLogin()">Enter the Arena</button>
    <div style="margin-top:12px;font-size:.62rem;color:var(--tlo);">Stats saved between sessions.</div>
  </div>
</div>

<!-- ══════════════ CAMERA SCAN ══════════════ -->
<div id="cam-ov" class="hidden">
  <video id="cam-video" autoplay playsinline muted></video>
  <div class="cam-guide-wrap">
    <div class="cam-hint">Align the card's <strong style="color:var(--ghi)">name bar</strong> inside the box</div>
    <div class="cam-guide" id="cam-guide">
      <div class="cam-guide-corner tl"></div>
      <div class="cam-guide-corner tr"></div>
      <div class="cam-guide-corner bl"></div>
      <div class="cam-guide-corner br"></div>
      <div class="cam-scan-line" id="scan-line"></div>
    </div>
    <div id="cam-status">Ready — press Capture to scan</div>
  </div>
  <div class="cam-controls">
    <button class="cam-cap-btn" id="cam-cap-btn" onclick="captureAndScan()">Capture &amp; Identify</button>
    <button class="cam-close-btn" onclick="closeCamera()">Cancel</button>
  </div>
  <div id="cam-results" class="hidden">
    <div class="cr-title" id="cr-title">Results</div>
    <div id="cr-list"></div>
    <div class="cr-manual">
      <div class="cr-manual-lbl">Or type the card name manually:</div>
      <div class="cr-inp-row">
        <input class="inp" id="cr-manual-inp" placeholder="Card name..." style="flex:1;">
        <button class="btn gold sm" onclick="manualSearch()">Search</button>
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="btn sm" onclick="retryCapture()">Try Again</button>
      <button class="btn sm" style="margin-left:6px;" onclick="closeCamera()">Close</button>
    </div>
  </div>
</div>

<!-- ══════════════ NEW GAME MODAL ══════════════ -->
<div class="ov hidden" id="ng-ov">
  <div class="panel wide">
    <div class="ph"><div class="pt">New Game</div><button class="xbtn" onclick="closeOv('ng-ov')">&times;</button></div>
    <div class="pb">
      <div class="fl" style="margin-bottom:18px;"><label>Format</label></div>
      <div id="ng-mode-cont"></div>
      <div class="fl" style="margin-top:6px;"><label>Players</label></div>
      <div id="ng-players-list"></div>
      <button class="btn sm" onclick="addNgPlayer()" style="margin-bottom:16px;">+ Add Player</button>
      <div class="row2">
        <div class="fl"><label>Starting Life (auto from format)</label>
          <input class="inp" type="number" id="ng-life" value="40" min="1" max="999">
        </div>
        <div class="fl"><label>Notes (optional)</label>
          <input class="inp" id="ng-notes" placeholder="House rules...">
        </div>
      </div>
    </div>
    <div class="pf">
      <button class="btn" onclick="closeOv('ng-ov')">Cancel</button>
      <button class="btn gold" onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- ══════════════ MODE MODAL ══════════════ -->
<div class="ov hidden" id="mode-ov">
  <div class="panel wide">
    <div class="ph"><div class="pt">Select Format</div><button class="xbtn" onclick="closeOv('mode-ov')">&times;</button></div>
    <div class="pb"><div id="mode-grid-cont"></div></div>
    <div class="pf">
      <button class="btn" onclick="closeOv('mode-ov')">Cancel</button>
      <button class="btn gold" onclick="confirmMode()">Confirm</button>
    </div>
  </div>
</div>

<!-- ══════════════ STATS MODAL ══════════════ -->
<div class="ov hidden" id="stats-ov">
  <div class="panel wide">
    <div class="ph"><div class="pt">Player Stats &mdash; <span id="stats-name" style="color:var(--thi);"></span></div><button class="xbtn" onclick="closeOv('stats-ov')">&times;</button></div>
    <div class="pb" id="stats-body"></div>
    <div class="pf">
      <button class="btn red sm" onclick="clearStats()">Clear All Stats</button>
      <button class="btn" onclick="closeOv('stats-ov')">Close</button>
    </div>
  </div>
</div>

<!-- ══════════════ LIFE EDIT MODAL ══════════════ -->
<div class="ov hidden" id="life-ov">
  <div class="panel narrow">
    <div class="ph"><div class="pt" id="life-ov-title">Set Life</div><button class="xbtn" onclick="closeOv('life-ov')">&times;</button></div>
    <div class="pb">
      <input class="inp" type="number" id="life-ov-inp" style="font-size:1.5rem;text-align:center;font-family:var(--ff1);" min="-999" max="999">
    </div>
    <div class="pf">
      <button class="btn" onclick="closeOv('life-ov')">Cancel</button>
      <button class="btn gold" onclick="confirmSetLife()">Set Life</button>
    </div>
  </div>
</div>

<!-- ══════════════ CARD LOOKUP MODAL ══════════════ -->
<div class="ov hidden" id="card-ov">
  <div class="panel wide">
    <div class="ph"><div class="pt" id="card-ov-title">Card Lookup</div><button class="xbtn" onclick="closeOv('card-ov')">&times;</button></div>
    <div class="pb" id="card-ov-body"></div>
    <div class="pf" id="card-ov-foot">
      <button class="btn" onclick="closeOv('card-ov')">Close</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app">
  <div id="topbar">
    <div class="tb-logo">MTG IRL</div>
    <div class="tb-div"></div>
    <div class="tb-mode" id="tb-mode" onclick="openOv('mode-ov');buildModeGrid('mode-grid-cont')">Commander / EDH</div>
    <div class="tb-div"></div>
    <div id="turn-display">
      <span class="turn-arrow">Turn</span>
      <span id="active-player-name">—</span>
      <span id="turn-num">1</span>
    </div>
    <div class="tb-sp"></div>
    <button id="end-turn-btn" onclick="endTurn()">End Turn &#8594;</button>
  </div>

  <div id="players-area" class="p2"></div>

  <div id="bottom-bar">
    <button class="btn gold" onclick="openNewGame()">New Game</button>
    <button class="btn" onclick="openCamera()">&#9654; Scan Card</button>
    <div class="bb-sp"></div>
    <button class="btn sm" onclick="openOv('stats-ov');renderStats()">Stats</button>
    <button class="btn sm" onclick="untapAllPlayers()">Untap All</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
const MODES = {
  standard:        {name:'Standard',        life:20, deck:60,  cmd:false},
  historic:        {name:'Historic',         life:20, deck:60,  cmd:false},
  timeless:        {name:'Timeless',         life:20, deck:60,  cmd:false},
  explorer:        {name:'Explorer',         life:20, deck:60,  cmd:false},
  pioneer:         {name:'Pioneer',          life:20, deck:60,  cmd:false},
  modern:          {name:'Modern',           life:20, deck:60,  cmd:false},
  legacy:          {name:'Legacy',           life:20, deck:60,  cmd:false},
  vintage:         {name:'Vintage',          life:20, deck:60,  cmd:false},
  pauper:          {name:'Pauper',           life:20, deck:60,  cmd:false},
  commander:       {name:'Commander / EDH',  life:40, deck:100, cmd:true},
  brawl:           {name:'Brawl',            life:25, deck:60,  cmd:true},
  historic_brawl:  {name:'Historic Brawl',   life:25, deck:100, cmd:true},
  oathbreaker:     {name:'Oathbreaker',      life:20, deck:60,  cmd:true},
  duel_commander:  {name:'Duel Commander',   life:20, deck:100, cmd:true},
  draft:           {name:'Draft / Sealed',   life:20, deck:40,  cmd:false},
  two_headed_giant:{name:'Two-Headed Giant', life:30, deck:60,  cmd:false},
};
const MODE_CATS = [
  {l:'Arena',    c:'arena',   k:['standard','historic','timeless','explorer']},
  {l:'Paper',    c:'paper',   k:['pioneer','modern','legacy','vintage','pauper']},
  {l:'Commander',c:'edh',     k:['commander','brawl','historic_brawl','oathbreaker','duel_commander']},
  {l:'Limited',  c:'limited', k:['draft','two_headed_giant']},
];

// ════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════
let myName = '';
let G = null; // game state

function defaultGame(mode, players, lifeOverride) {
  const m = MODES[mode] || MODES.commander;
  const life = lifeOverride || m.life;
  return {
    mode,
    turn: 0,          // index into players array
    turnNum: 1,
    players: players.map(name => ({
      name,
      life,
      poison: 0,
      energy: 0,
      experience: 0,
      storm: 0,
      cmdDmg: {},     // { fromPlayerName: number }
      monarch: false,
      initiative: false,
    })),
    startedAt: Date.now(),
    notes: '',
  };
}

// ════════════════════════════════════════
// STATS (localStorage)
// ════════════════════════════════════════
function loadStats() {
  try { return JSON.parse(localStorage.getItem('mtgirl_stats_' + myName) || 'null') || {wins:0,losses:0,history:[]}; }
  catch { return {wins:0,losses:0,history:[]}; }
}
function saveStats(st) {
  localStorage.setItem('mtgirl_stats_' + myName, JSON.stringify(st));
}
function recordResult(result) {
  if (!G) return;
  const st = loadStats();
  if (result === 'W') st.wins++; else st.losses++;
  const m = MODES[G.mode] || MODES.commander;
  const me = G.players.find(p => p.name === myName) || G.players[0];
  st.history.unshift({
    result,
    format: m.name,
    life: me.life,
    players: G.players.map(p=>p.name).join(', '),
    date: new Date().toLocaleDateString(),
    turns: G.turnNum,
  });
  st.history = st.history.slice(0,50);
  saveStats(st);
  renderBottomStats();
}

function renderBottomStats() {
  // no bottom stats needed — handled in stats modal
}

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
document.getElementById('l-name').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const n = document.getElementById('l-name').value.trim();
  if (!n) return;
  myName = n;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.add('on');
  // Check for saved game
  const saved = localStorage.getItem('mtgirl_game_' + myName);
  if (saved) {
    try {
      G = JSON.parse(saved);
      renderAll();
      return;
    } catch {}
  }
  // Start new game setup
  openNewGame();
}

function saveGame() {
  if (G) localStorage.setItem('mtgirl_game_' + myName, JSON.stringify(G));
}

// ════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════
function renderAll() {
  if (!G) return;
  renderTopbar();
  renderPlayers();
}

function renderTopbar() {
  const m = MODES[G.mode] || MODES.commander;
  document.getElementById('tb-mode').textContent = m.name;
  const ap = G.players[G.turn];
  document.getElementById('active-player-name').textContent = ap ? ap.name : '—';
  document.getElementById('turn-num').textContent = `#${G.turnNum}`;
}

// ════════════════════════════════════════
// RENDER PLAYER PANELS
// ════════════════════════════════════════
function renderPlayers() {
  const area = document.getElementById('players-area');
  const n = G.players.length;
  // Set grid class
  area.className = `p${Math.min(n,6)}`;
  area.innerHTML = G.players.map((p,i) => buildPlayerPanel(p, i)).join('');

  // Attach all events via delegation
  area.querySelectorAll('[data-pact]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {pact, pidx, delta, key, from} = el.dataset;
      const idx = parseInt(pidx);
      if (pact === 'life-adj')    adjLife(idx, parseInt(delta));
      if (pact === 'life-open')   openLifeModal(idx);
      if (pact === 'quick-life')  adjLife(idx, parseInt(delta));
      if (pact === 'ctr-adj')     adjCounter(idx, key, parseInt(delta));
      if (pact === 'cdmg-adj')    adjCmdDmg(idx, from, parseInt(delta));
      if (pact === 'status-tog')  toggleStatus(idx, key);
    });
  });
}

function buildPlayerPanel(p, i) {
  const isActive = i === G.turn;
  const m = MODES[G.mode] || MODES.commander;
  const poisonMax = G.mode === 'two_headed_giant' ? 15 : 10;

  const lifeCls = p.life <= 5 ? 'crit' : p.life <= 10 ? 'lo' : '';

  // Commander damage rows (only in commander formats, only from other players)
  let cdmgHtml = '';
  if (m.cmd && G.players.length > 1) {
    const others = G.players.filter((_,j) => j !== i);
    cdmgHtml = `
    <div class="cdmg-section">
      <div class="cdmg-title">Commander Damage Received</div>
      ${others.map(op => {
        const v = p.cmdDmg[op.name] || 0;
        const cls = v >= 21 ? 'dead' : v >= 18 ? 'warn' : '';
        return `<div class="cdmg-row">
          <span class="cdmg-from">${op.name}</span>
          <span class="cdmg-val ${cls}">${v}</span>
          <div class="pca">
            <div class="pca-btn" data-pact="cdmg-adj" data-pidx="${i}" data-from="${op.name}" data-delta="-1">-</div>
            <div class="pca-btn" data-pact="cdmg-adj" data-pidx="${i}" data-from="${op.name}" data-delta="1">+</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Counter rows
  const ctrs = [
    {key:'poison',   label:'Poison',     icon:'&#9760;', val:p.poison,     warn:poisonMax-3, dead:poisonMax},
    {key:'energy',   label:'Energy',     icon:'&#9889;', val:p.energy,     warn:999, dead:999},
    {key:'experience',label:'Experience',icon:'&#11052;',val:p.experience, warn:999, dead:999},
    {key:'storm',    label:'Storm',      icon:'&#9928;', val:p.storm,      warn:999, dead:999},
  ];

  const ctrsHtml = ctrs.map(c => {
    const cls = c.val >= c.dead ? 'dead' : c.val >= c.warn ? 'warn' : '';
    return `<div class="pc-row">
      <div class="pc-lbl"><span class="pc-ico">${c.icon}</span>${c.label}</div>
      <div class="pc-val ${cls}">${c.val}</div>
      <div class="pca">
        <div class="pca-btn" data-pact="ctr-adj" data-pidx="${i}" data-key="${c.key}" data-delta="-1">-</div>
        <div class="pca-btn" data-pact="ctr-adj" data-pidx="${i}" data-key="${c.key}" data-delta="1">+</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="pp ${isActive ? 'active' : ''}" id="pp-${i}">
    <div class="pp-head">
      <span class="pp-name">${p.name}</span>
      <span class="pp-turn-badge">ACTIVE TURN</span>
      <span class="pp-format-badge">${MODES[G.mode]?.name || ''}</span>
    </div>
    <div class="pp-life">
      <div class="pp-life-adj" data-pact="life-adj" data-pidx="${i}" data-delta="-1">&#8722;</div>
      <div class="pp-life-num ${lifeCls}" data-pact="life-open" data-pidx="${i}">${p.life}</div>
      <div class="pp-life-adj" data-pact="life-adj" data-pidx="${i}" data-delta="1">+</div>
    </div>
    <div class="pp-quick">
      <div class="qlb neg" data-pact="quick-life" data-pidx="${i}" data-delta="-5">-5</div>
      <div class="qlb neg" data-pact="quick-life" data-pidx="${i}" data-delta="-2">-2</div>
      <div class="qlb neg" data-pact="quick-life" data-pidx="${i}" data-delta="-1">-1</div>
      <div class="qlb pos" data-pact="quick-life" data-pidx="${i}" data-delta="1">+1</div>
      <div class="qlb pos" data-pact="quick-life" data-pidx="${i}" data-delta="2">+2</div>
      <div class="qlb pos" data-pact="quick-life" data-pidx="${i}" data-delta="5">+5</div>
    </div>
    <div class="pp-ctrs">
      ${ctrsHtml}
    </div>
    ${cdmgHtml}
    <div class="pp-status">
      <div class="status-chip ${p.monarch?'on':''}" data-pact="status-tog" data-pidx="${i}" data-key="monarch">Monarch</div>
      <div class="status-chip ${p.initiative?'on':''}" data-pact="status-tog" data-pidx="${i}" data-key="initiative">Initiative</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
// PLAYER ACTIONS
// ════════════════════════════════════════
function adjLife(idx, delta) {
  if (!G) return;
  G.players[idx].life += delta;
  saveGame();
  renderPlayers();
}

function adjCounter(idx, key, delta) {
  if (!G) return;
  G.players[idx][key] = Math.max(0, (G.players[idx][key] || 0) + delta);
  saveGame();
  renderPlayers();
}

function adjCmdDmg(idx, fromName, delta) {
  if (!G) return;
  const p = G.players[idx];
  if (!p.cmdDmg) p.cmdDmg = {};
  p.cmdDmg[fromName] = Math.max(0, (p.cmdDmg[fromName] || 0) + delta);
  saveGame();
  renderPlayers();
}

function toggleStatus(idx, key) {
  if (!G) return;
  G.players[idx][key] = !G.players[idx][key];
  saveGame();
  renderPlayers();
}

// ════════════════════════════════════════
// LIFE MODAL
// ════════════════════════════════════════
let lifeModalIdx = null;
function openLifeModal(idx) {
  lifeModalIdx = idx;
  const p = G.players[idx];
  document.getElementById('life-ov-title').textContent = `Set Life — ${p.name}`;
  document.getElementById('life-ov-inp').value = p.life;
  openOv('life-ov');
  setTimeout(() => document.getElementById('life-ov-inp').select(), 60);
}
function confirmSetLife() {
  const v = parseInt(document.getElementById('life-ov-inp').value);
  if (isNaN(v) || lifeModalIdx === null) return;
  G.players[lifeModalIdx].life = v;
  saveGame();
  renderPlayers();
  closeOv('life-ov');
}
document.getElementById('life-ov-inp').addEventListener('keydown', e => { if(e.key==='Enter') confirmSetLife(); });

// ════════════════════════════════════════
// END TURN — REAL ROTATION
// ════════════════════════════════════════
function endTurn() {
  if (!G) return;
  const prev = G.turn;
  G.turn = (G.turn + 1) % G.players.length;
  // Increment turn number only when we wrap back to player 0
  if (G.turn === 0) G.turnNum++;
  // Reset storm counter for ALL players on new full round
  if (G.turn === 0) G.players.forEach(p => { p.storm = 0; });
  // Flash animation on old panel
  const oldEl = document.getElementById(`pp-${prev}`);
  if (oldEl) oldEl.style.opacity = '0.5';
  saveGame();
  renderAll();
  // Restore opacity
  setTimeout(() => {
    const el = document.getElementById(`pp-${prev}`);
    if (el) el.style.opacity = '';
  }, 300);
  // Scroll new active player into view on mobile
  const newEl = document.getElementById(`pp-${G.turn}`);
  if (newEl) newEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function untapAllPlayers() {
  // Visual only — signals to untap; no digital permanents tracked here
  // Flash all panels gold briefly
  document.querySelectorAll('.pp').forEach(el => {
    el.style.boxShadow = '0 0 20px rgba(200,164,74,.4)';
    setTimeout(() => el.style.boxShadow = '', 600);
  });
}

// ════════════════════════════════════════
// NEW GAME SETUP
// ════════════════════════════════════════
let ngMode = 'commander';
let ngPlayers = [];

function openNewGame() {
  ngMode = G?.mode || 'commander';
  ngPlayers = G ? G.players.map(p=>p.name) : [myName, 'Player 2'];
  buildNgModeGrid();
  buildNgPlayersList();
  document.getElementById('ng-life').value = MODES[ngMode]?.life || 20;
  openOv('ng-ov');
}

function buildNgModeGrid() {
  const cont = document.getElementById('ng-mode-cont');
  cont.innerHTML = MODE_CATS.map(cat => `
    <div class="mc ${cat.c}">${cat.l}</div>
    <div class="mgrid">
      ${cat.k.map(k => { const m = MODES[k]; return `
        <div class="mt ${k===ngMode?'sel':''}" data-ngm="${k}">
          <div class="mn">${m.name}</div>
          <div class="ml">${m.life} life</div>
          <div class="md">${m.deck} cards${m.cmd?' &bull; Cmdr':''}</div>
        </div>`;}).join('')}
    </div>`).join('');
  cont.querySelectorAll('[data-ngm]').forEach(el => {
    el.addEventListener('click', () => {
      ngMode = el.dataset.ngm;
      cont.querySelectorAll('.mt').forEach(t => t.classList.toggle('sel', t.dataset.ngm===ngMode));
      document.getElementById('ng-life').value = MODES[ngMode]?.life || 20;
    });
  });
}

function buildNgPlayersList() {
  const el = document.getElementById('ng-players-list');
  el.innerHTML = ngPlayers.map((name, i) => `
    <div class="player-row">
      <span class="pnum">P${i+1}</span>
      <input class="inp" style="flex:1;" value="${name}" data-pidx="${i}" placeholder="Player name..." maxlength="24">
      ${i > 1 ? `<button class="player-row-rm" data-rmidx="${i}">&times;</button>` : ''}
    </div>`).join('');
  el.querySelectorAll('[data-pidx]').forEach(inp => {
    inp.addEventListener('input', () => { ngPlayers[parseInt(inp.dataset.pidx)] = inp.value.trim(); });
  });
  el.querySelectorAll('[data-rmidx]').forEach(btn => {
    btn.addEventListener('click', () => { ngPlayers.splice(parseInt(btn.dataset.rmidx),1); buildNgPlayersList(); });
  });
}

function addNgPlayer() {
  ngPlayers.push(`Player ${ngPlayers.length+1}`);
  buildNgPlayersList();
}

function startGame() {
  const players = ngPlayers.filter(p => p.trim());
  if (!players.length) return alert('Add at least one player.');
  const life = parseInt(document.getElementById('ng-life').value) || MODES[ngMode].life;
  // Record win/loss if there was a previous game
  G = defaultGame(ngMode, players, life);
  saveGame();
  closeOv('ng-ov');
  renderAll();
}

// ════════════════════════════════════════
// MODE MODAL
// ════════════════════════════════════════
let selMode = 'commander';

function buildModeGrid(containerId) {
  selMode = G?.mode || 'commander';
  const cont = document.getElementById(containerId);
  cont.innerHTML = MODE_CATS.map(cat => `
    <div class="mc ${cat.c}">${cat.l}</div>
    <div class="mgrid">
      ${cat.k.map(k => { const m = MODES[k]; return `
        <div class="mt ${k===selMode?'sel':''}" data-sm="${k}">
          <div class="mn">${m.name}</div>
          <div class="ml">${m.life} life</div>
          <div class="md">${m.deck} cards${m.cmd?' &bull; Cmdr':''}</div>
        </div>`;}).join('')}
    </div>`).join('');
  cont.querySelectorAll('[data-sm]').forEach(el => {
    el.addEventListener('click', () => {
      selMode = el.dataset.sm;
      cont.querySelectorAll('.mt').forEach(t => t.classList.toggle('sel', t.dataset.sm===selMode));
    });
  });
}

function confirmMode() {
  if (!G || selMode === G.mode) { closeOv('mode-ov'); return; }
  const m = MODES[selMode];
  if (!confirm(`Switch to ${m.name}? Starting life will reset to ${m.life}.`)) { closeOv('mode-ov'); return; }
  G.mode = selMode;
  G.players.forEach(p => { p.life = m.life; });
  saveGame();
  renderAll();
  closeOv('mode-ov');
}

// STATS
// ════════════════════════════════════════
function renderStats() {
  document.getElementById('stats-name').textContent = myName;
  const st = loadStats();
  const total = st.wins + st.losses;
  const wr = total > 0 ? Math.round(st.wins/total*100) : 0;
  document.getElementById('stats-body').innerHTML = `
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-big w">${st.wins}</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-tile"><div class="stat-big l">${st.losses}</div><div class="stat-lbl">Losses</div></div>
      <div class="stat-tile"><div class="stat-big">${total}</div><div class="stat-lbl">Games</div></div>
      <div class="stat-tile"><div class="stat-big">${wr}%</div><div class="stat-lbl">Win Rate</div></div>
    </div>
    <div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;">
      <span style="font-family:var(--ff1);font-size:.58rem;letter-spacing:.14em;color:var(--tlo);">RECORD WIN / LOSS FOR CURRENT GAME:</span>
      <button class="btn grn sm" onclick="recordResult('W')">Win</button>
      <button class="btn red sm" onclick="recordResult('L')">Loss</button>
    </div>
    <div style="font-family:var(--ff1);font-size:.56rem;letter-spacing:.16em;color:var(--tlo);margin-bottom:8px;">HISTORY</div>
    ${st.history.length
      ? st.history.map(g=>`
          <div class="hist-row">
            <span class="hist-res ${g.result}">${g.result==='W'?'WIN':'LOSS'}</span>
            <div class="hist-detail">
              <div class="hist-fmt">${g.format} &mdash; ${g.players}</div>
              <div class="hist-meta">${g.date} &bull; Ended at ${g.life} life &bull; Turn ${g.turns||'?'}</div>
            </div>
          </div>`)
        .join('')
      : '<div style="color:var(--tlo);font-style:italic;font-size:.78rem;padding:12px 0;">No history yet. Record wins/losses when games end.</div>'}`;
}

function clearStats() {
  if (!confirm('Clear all stats for ' + myName + '?')) return;
  saveStats({wins:0,losses:0,history:[]});
  renderStats();
}

// ════════════════════════════════════════
// CAMERA CARD SCANNING (OCR like Mana Box)
// ════════════════════════════════════════
let camStream = null;
let tesseractWorker = null;

async function openCamera() {
  document.getElementById('cam-ov').classList.remove('hidden');
  document.getElementById('cam-results').classList.add('hidden');
  document.getElementById('cam-status').textContent = 'Starting camera...';

  try {
    // Prefer back camera on mobile
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: {ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }
    });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    await video.play();
    document.getElementById('cam-status').textContent = 'Ready — align card name in the box, then press Capture';
  } catch(e) {
    document.getElementById('cam-status').textContent = 'Camera access denied. Use manual search below.';
    showManualFallback();
  }

  // Init Tesseract worker if not done
  if (!tesseractWorker) {
    try {
      tesseractWorker = await Tesseract.createWorker('eng');
    } catch(e) {
      console.warn('Tesseract init failed:', e);
    }
  }
}

function closeCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('cam-ov').classList.add('hidden');
  document.getElementById('cam-guide').classList.remove('scanning');
}

async function captureAndScan() {
  const video = document.getElementById('cam-video');
  const guide = document.getElementById('cam-guide');
  const status = document.getElementById('cam-status');

  if (!video.srcObject) { showManualFallback(); return; }

  // Start scan animation
  guide.classList.add('scanning');
  status.textContent = 'Capturing...';
  document.getElementById('cam-cap-btn').disabled = true;

  try {
    // Draw current frame to canvas
    const canvas = document.getElementById('ocr-canvas');
    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Calculate the guide box region in video coordinates
    // The guide box is centered horizontally, roughly 85% wide, and is a thin strip
    // Guide covers the card name bar (top ~12% of card)
    const guideRect = guide.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const scaleX = canvas.width  / videoRect.width;
    const scaleY = canvas.height / videoRect.height;

    const cropX = (guideRect.left - videoRect.left) * scaleX;
    const cropY = (guideRect.top  - videoRect.top)  * scaleY;
    const cropW = guideRect.width  * scaleX;
    const cropH = guideRect.height * scaleY;

    // Extract the cropped region
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width  = Math.max(cropW, 1);
    cropCanvas.height = Math.max(cropH, 1);
    const cropCtx = cropCanvas.getContext('2d');

    // Process image for better OCR:
    // 1. Grayscale
    // 2. High contrast
    cropCtx.filter = 'grayscale(100%) contrast(180%) brightness(110%)';
    cropCtx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropCanvas.width, cropCanvas.height);

    // Scale up for better OCR accuracy
    const bigCanvas = document.createElement('canvas');
    bigCanvas.width  = cropCanvas.width  * 3;
    bigCanvas.height = cropCanvas.height * 3;
    const bigCtx = bigCanvas.getContext('2d');
    bigCtx.imageSmoothingEnabled = false;
    bigCtx.drawImage(cropCanvas, 0, 0, bigCanvas.width, bigCanvas.height);

    status.textContent = 'Reading card name...';

    let ocrText = '';
    if (tesseractWorker) {
      const result = await tesseractWorker.recognize(bigCanvas);
      ocrText = result.data.text.trim();
    }

    guide.classList.remove('scanning');
    document.getElementById('cam-cap-btn').disabled = false;

    if (!ocrText || ocrText.length < 2) {
      status.textContent = 'Could not read text — try again or use manual search';
      showSearchResults([], '');
      return;
    }

    // Clean OCR text — take first line, remove non-letter chars
    const cleaned = ocrText.split('\n')[0]
      .replace(/[^a-zA-Z0-9 ',\-]/g, '')
      .trim()
      .substring(0, 40);

    status.textContent = `Read: "${cleaned}" — searching...`;
    await searchAndShowResults(cleaned);

  } catch(e) {
    guide.classList.remove('scanning');
    document.getElementById('cam-cap-btn').disabled = false;
    status.textContent = 'Error — try again or use manual search';
    console.error('Scan error:', e);
    showManualFallback();
  }
}

function retryCapture() {
  document.getElementById('cam-results').classList.add('hidden');
  document.getElementById('cam-status').textContent = 'Ready — align card name in the box, then press Capture';
}

async function searchAndShowResults(query) {
  if (!query) { showSearchResults([], query); return; }
  try {
    // Use Scryfall autocomplete then fetch each match
    const r = await fetch(`/autocomplete?q=${encodeURIComponent(query)}`);
    const data = await r.json();
    const names = (data.names || []).slice(0, 5);

    if (!names.length) {
      // Try fuzzy via search endpoint
      const r2 = await fetch(`/search_cards?q=${encodeURIComponent(query)}`);
      const d2  = await r2.json();
      const cards = (d2.cards || []).slice(0, 5);
      showSearchResults(cards, query);
      return;
    }

    // Fetch each name for art
    const cards = await Promise.all(names.map(async name => {
      try {
        const rc = await fetch(`/resolve_card?name=${encodeURIComponent(name)}`);
        if (rc.ok) return await rc.json();
      } catch {}
      return {name, type:'', text:'', art_url:'', power:null, toughness:null};
    }));
    showSearchResults(cards.filter(Boolean), query);
  } catch(e) {
    showSearchResults([], query);
  }
}

function showSearchResults(cards, query) {
  const res = document.getElementById('cam-results');
  const list = document.getElementById('cr-list');
  document.getElementById('cr-title').textContent = cards.length
    ? `Found ${cards.length} match${cards.length>1?'es':''} for "${query}"`
    : `No matches for "${query}"`;

  list.innerHTML = cards.map(c => `
    <div class="cr-match" data-cname="${encodeURIComponent(c.name)}">
      ${c.art_url
        ? `<img src="${c.art_url}" alt="" loading="lazy">`
        : `<div class="cr-ph">${c.name[0]}</div>`}
      <div>
        <div class="cr-name">${c.name}</div>
        <div class="cr-type">${c.type||''} ${c.mana_cost ? '&bull; '+c.mana_cost : ''}</div>
        <div class="cr-text">${(c.text||'').substring(0,100)}${(c.text||'').length>100?'...':''}</div>
        ${c.power!==null&&c.power!==undefined ? `<div style="margin-top:4px;font-family:var(--ff1);font-size:.6rem;color:var(--thi);">${c.power}/${c.toughness}</div>` : ''}
      </div>
    </div>`).join('');

  // Clicking a result opens the card detail
  list.querySelectorAll('.cr-match').forEach(el => {
    el.addEventListener('click', () => {
      const name = decodeURIComponent(el.dataset.cname);
      const card = cards.find(c => c.name === name);
      if (card) showCardDetail(card);
    });
  });

  document.getElementById('cr-manual-inp').value = query;
  res.classList.remove('hidden');
}

function showManualFallback() {
  document.getElementById('cam-results').classList.remove('hidden');
  document.getElementById('cr-title').textContent = 'Manual Card Search';
  document.getElementById('cr-list').innerHTML = '';
  document.getElementById('cr-manual-inp').value = '';
  setTimeout(() => document.getElementById('cr-manual-inp').focus(), 100);
}

async function manualSearch() {
  const q = document.getElementById('cr-manual-inp').value.trim();
  if (!q) return;
  document.getElementById('cr-title').textContent = `Searching "${q}"...`;
  await searchAndShowResults(q);
}
document.getElementById('cr-manual-inp').addEventListener('keydown', e => { if(e.key==='Enter') manualSearch(); });

function showCardDetail(card) {
  closeCamera();
  document.getElementById('card-ov-title').textContent = card.name;
  document.getElementById('card-ov-body').innerHTML = `
    <div style="display:flex;gap:18px;flex-wrap:wrap;">
      ${card.art_url ? `<img src="${card.art_url}" style="width:160px;border:1px solid var(--bdr2);flex-shrink:0;" alt="">` : ''}
      <div style="flex:1;min-width:160px;">
        <div style="font-family:var(--ff1);font-size:1rem;color:var(--gold);margin-bottom:5px;">${card.name}</div>
        <div style="font-size:.72rem;color:var(--tlo);font-style:italic;margin-bottom:8px;">${card.type||''}</div>
        ${card.mana_cost ? `<div style="font-size:.72rem;color:var(--thi);margin-bottom:8px;">Cost: ${card.mana_cost}</div>` : ''}
        <div style="font-size:.8rem;color:var(--text);line-height:1.6;margin-bottom:10px;">${card.text||''}</div>
        ${card.power!==null&&card.power!==undefined ? `<div style="font-family:var(--ff1);font-size:.85rem;color:var(--thi);">${card.power} / ${card.toughness}</div>` : ''}
        ${card.set_name ? `<div style="font-size:.62rem;color:var(--tlo);margin-top:8px;">${card.set_name}</div>` : ''}
        ${card.legalities ? buildLegality(card.legalities) : ''}
      </div>
    </div>`;
  openOv('card-ov');
}

function buildLegality(leg) {
  const show = ['standard','historic','pioneer','modern','legacy','commander','pauper'];
  const rows = show.map(f => {
    const v = leg[f];
    if (!v) return '';
    const legal = v === 'legal';
    const color = legal ? '#50c870' : '#f07060';
    return `<span style="font-family:var(--ff1);font-size:.5rem;letter-spacing:.06em;padding:2px 6px;border-radius:2px;background:var(--s2);border:1px solid var(--bdr);color:${color};display:inline-block;margin:2px;">${f.replace('_',' ')}</span>`;
  }).join('');
  return rows ? `<div style="margin-top:8px;">${rows}</div>` : '';
}

// ════════════════════════════════════════
// OVERLAY HELPERS
// ════════════════════════════════════════
function openOv(id)  { document.getElementById(id)?.classList.remove('hidden'); }
function closeOv(id) { document.getElementById(id)?.classList.add('hidden'); }

document.querySelectorAll('.ov').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) closeOv(el.id); });
});

// ════════════════════════════════════════

document.getElementById('l-name').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
